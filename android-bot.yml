name: Android Bot

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'

    - name: Setup Android
      uses: android-actions/setup-android@v3

    - name: Create Emulator
      run: |
        sdkmanager "system-images;android-30;default;x86_64"
        echo "no" | avdmanager create avd -n test -k "system-images;android-30;default;x86_64"

    - name: Start Emulator
      run: |
        emulator -avd test -no-window -no-audio -no-boot-anim &
        adb wait-for-device
        adb shell input keyevent 82

    - name: Test
      run: |
        adb shell input text "hello"
